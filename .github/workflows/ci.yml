name: CI Pipeline

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: set up python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.11'
      - name: Display Python version
        run: python --version

      - name: Install dependencies
        run:  pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v