version: '3.8'
services:
  qdrant:
    image:  qdrant/qdrant:v1.17.0
    restart: always
    container_name: qdrant
    ports:
      - 6333:6333
    expose:
      - 6333
    volumes:
      - ./qdrant_data:/qdrant/storage  
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./uploads:/app/uploads


